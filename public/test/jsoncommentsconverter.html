<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yt-dlp JSON Comment Parser</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .SNSPost {
            border: 3px solid rgba(255, 255, 255, 0.4);
            background-color: rgba(0, 0, 0, 0.5);
            -webkit-backdrop-filter: blur(5px);
            backdrop-filter: blur(5px);
            padding: 10px;
            margin: 10px;
            min-height: 50px;
            border-radius: 15px;
        }

        .SNSUserInfo {
            padding: 5px;
        }

        .SNSExtraInfo {
            position: absolute;
            text-align: right;
            color: #ffffffA5;
            top: 10px;
            right: 10px;
        }

        .SNSUsername {
            color: #ffffff85;
        }

        #SNSDate {
            color: #ffffffC0;
        }

        .SNSIcon {
            border-radius: 10px;
            width: 50px;
            float: left;
            margin-right: 10px;
        }
    </style>
</head>

<body>
    <video src="backgrounds/cityTraffic.mp4" autoplay loop muted playsinline id="videoBG"></video>
    <nav>
        <a href="../index.html">Back</a>
    </nav>

    <p>Upload the JSON comments file outputed by yt-dlp.<br />
        <button onclick="openFile()">Import file</button>
        <code><span id="selectedFile">No file selected...</span></code><br />
        <input type="file" id="getFile" onchange="read(this)" style="display:none">
    </p>

    <div id="videoInfo"></div>
    <div id="filterButtons" class="hidden">
        <button onclick="filterComments('Liked')">Filter comments by 💖liked</button>
        <button onclick="filterComments('Pinned')">Filter comments by 📌pinned</button>
        <button onclick="filterComments()">Remove filter</button>
    </div>
    <div id="commentCount"></div>
    <div id="commentsBox"></div><br>


    <script>
        // setup
        const videoInfo = document.getElementById("videoInfo");
        const commentsBox = document.getElementById("commentsBox");
        const commentCount = document.getElementById("commentCount");
        const selectedFile = document.getElementById("selectedFile");
        const filterButtons = document.getElementById("filterButtons");
        let highestvideo, highestaudio

        function openFile() {
            document.getElementById('getFile').click()
        }

        function readFile(file) {
            return new Promise((resolve, reject) => {
                let fr = new FileReader();
                fr.onload = x => resolve(fr.result);
                fr.readAsText(file);
            })
        }

        function formatBytes(bytes, decimals = 2) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB', 'PB', 'EB', 'ZB', 'YB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(decimals)) + ' ' + sizes[i];
        }

        async function getDislikes() {
            const response = await fetch("https://returnyoutubedislikeapi.com/votes?videoId=" + data.id);
            let dislikeresponse = await response.json();
            document.getElementById("dislikeCounter").innerHTML = dislikeresponse.dislikes
        }

        async function read(input) {
            videoInfo.innerHTML = "Reading comments..."
            commentsBox.innerHTML = ""

            data = await readFile(input.files[0]);
            selectedFile.innerHTML = input.files[0].name
            data = JSON.parse(data)

            let dislikes = "Unknown..."
            getDislikes()

            videoInfo.innerHTML = `
            <img style="border-radius: 10px" src="${data.thumbnail}"><br/>--------------------------------------------------<br/>
            <a target="_blank" href="https://youtube.com/watch?v=${data.id}">${data.title}</a><br/>
            Views: ${data.view_count} | Duration: ${data.duration_string}
            <br/>Uploaded by: <a target="_blank" href="${data.uploader_url}">${data.channel} (${data.uploader_id})</a> | ${data.channel_follower_count} subscribers
            <br/>Uploaded: ${data.upload_date.replace(/(\d{4})(\d{2})(\d{2})/, '$1-$2-$3')}
            <br/>Likes: ${data.like_count} | Dislikes: <span id="dislikeCounter">Loading...</span> | Comments: ${data.comment_count}
            <br/>Categories: ${data.categories}
            <br/>File size: ${formatBytes(data.filesize_approx)} (${data.format_note})
            <br/>--------------------------------------------------<br/>
            ${data.description.replace(/\n/g, '<br>')}
            <br/>--------------------------------------------------<br/>
            `

            const fragment = document.createDocumentFragment();

            for (let index = 0; index < data.comments.length; index++) {
                const element = data.comments[index];
                const commentDiv = document.createElement('div');

                commentDiv.id = element.id;
                if (element.parent === "root") {
                    commentDiv.classList.add('SNSParent');
                    commentDiv.innerHTML = `
                        <div class="SNSPost">
                            <div class="SNSArea"><img class="SNSIcon" src="${element.author_thumbnail}">
                                <div class="SNSUserInfo">
                                    <span class="SNSUsername">
                                        <a target="_blank" href="${element.author_url}">${element.author}</a> | 
                                        <a target="_blank" href="https://youtube.com/watch?v=${data.id}&lc=${element.id}">Open in YouTube</a>
                                    </span>
                                    <br><span id="SNSDate">${element._time_text}</span>
                                </div>
                                <div class="SNSExtraInfo">
                                    ${element.like_count ? element.like_count : 0} likes
                                    <br>${element.is_pinned ? "📌Pinned<br>" : ""}
                                    ${element.is_favorited ? "💖Liked" : ""}
                                </div>
                            </div>
                            <div class="SNSPostText">
                                ${element.text.trim().replace(/\n/g, '<br>')}
                            </div>
                        </div>
                        <div class="Replies" id="${element.id}reply"></div>
                        `;
                } else {
                    commentDiv.classList.add('SNSPost');
                    commentDiv.style.marginLeft = '75px';
                    commentDiv.innerHTML = `
                        <div class="SNSArea"><img class="SNSIcon" src="${element.author_thumbnail}">
                            <div class="SNSUserInfo">
                                <span class="SNSUsername">
                                    <a target="_blank" href="${element.author_url}">${element.author}</a> | 
                                    <a target="_blank" href="https://youtube.com/watch?v=${data.id}&lc=${element.id}">Open in YouTube</a>
                                </span>
                                <br><span id="SNSDate">${element._time_text}</span>
                            </div>
                            <div class="SNSExtraInfo">
                                ${element.like_count ? element.like_count : 0} likes
                                <br>${element.is_favorited ? "💖Liked" : ""}
                            </div>
                        </div>
                        <div class="SNSPostText">
                            ${element.text.trim().replace(/\n/g, '<br>')}
                        </div>
                        `;
                }
                if (element.is_pinned) commentDiv.dataset.info = "Pinned "
                if (element.is_favorited){
                    if (commentDiv.dataset.info){
                        commentDiv.dataset.info += "Liked "
                    } else {
                        commentDiv.dataset.info = "Liked "
                    }
                }
                

                fragment.appendChild(commentDiv);
            }

            commentsBox.appendChild(fragment);
            commentCount.innerText = "Comment count: " + data.comments.length;

            data.formats.forEach(element => {
                if (element.url) {
                    if (element.resolution == "audio only") {
                        highestaudio = element.url
                    } else if (element.format = "mp4") {
                        highestvideo = element.url
                    }
                }
            });

            commentsBox.innerHTML += 
            `<video id="ytVideo" controls>
                <source src="${highestvideo}">>
            </video>
            <audio controls id="ytAudio" src="${highestaudio}"></audio>`

            filterButtons.classList.remove("hidden")
        }

        function filterComments(filterBy){
            i = 0
            for (let index = 0; index < commentsBox.children.length; index++) {
                const element = commentsBox.children[index];
                if (filterBy){
                    if (element.dataset.info && element.dataset.info.includes(filterBy)){
                        element.classList.remove("hidden")
                        i++
                    } else {
                        element.classList.add("hidden")
                    }
                } else {
                    element.classList.remove("hidden")
                    i++
                }
            }
            commentCount.innerText = "Filtered comments: " + i;
        }
    </script>

</body>

</html>
